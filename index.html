<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semakan OT - Bravorians</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa; /* Latar belakang luar kelabu putih super clean */
            margin: 0;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-btn {
            background-color: #ffcc00; /* Kuning Solid Bravorians */
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4.5px;
        }
        .menu-line {
            width: 20px;
            height: 3px;
            background-color: #000000;
            border-radius: 2px;
        }
        .logo-title {
            font-style: italic;
            font-weight: 800;
            font-size: 20px;
            color: #000000;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .btn-keluar {
            background-color: #eff1f4;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 11px;
            color: #000000;
            letter-spacing: 0.5px;
        }

        /* Bahagian Logo Tengah */
        .middle-logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .middle-logo {
            width: 120px; /* Saiz logo tengah yang kemas */
            height: auto;
        }

        /* Ruangan Borang Input */
        .input-box {
            margin-bottom: 20px;
        }
        .input-box label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #8a94a6;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-box input {
            width: 100%;
            padding: 18px;
            border: none;
            background-color: #f1f3f6; /* Input kelabu flat lembut */
            border-radius: 16px;
            box-sizing: border-box;
            font-size: 14px;
            font-weight: 700;
            color: #000000;
            font-family: 'Montserrat', sans-serif;
        }
        .input-box input:focus {
            outline: 2px solid #ffcc00;
        }

        /* Butang Utama */
        .btn-submit {
            width: 100%;
            padding: 18px;
            background-color: #000000; /* Hitam Pekat Flat */
            border: none;
            color: #ffcc00; /* Tulisan Kuning */
            font-size: 13px;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        /* Kad Keputusan SEBIJI macam Jadual Hari Ini */
        .card-result {
            margin-top: 30px;
            background-color: #ffffff;
            border-radius: 32px; /* Bucu sangat bulat */
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            overflow: hidden;
            display: none; /* Sembunyi sebelum carian */
        }
        .card-header {
            background-color: #000000; /* Kepala Kad Hitam */
            color: #ffcc00;
            text-align: center;
            padding: 14px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-body {
            padding: 25px 20px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .info-left {
            display: flex;
            flex-direction: column;
        }
        .lbl-top {
            font-weight: 700;
            font-size: 13px;
            color: #000000;
        }
        .lbl-sub {
            font-size: 11px;
            color: #8a94a6;
            margin-top: 2px;
        }
        .val-right {
            font-weight: 700;
            font-size: 14px;
            color: #000000;
            text-align: right;
        }
        .val-amount {
            font-weight: 800;
            font-size: 26px; /* Duit tebal dan besar */
            color: #000000;
            text-align: right;
        }

        .loading-text {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: #8a94a6;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="menu-btn">
                <div class="menu-line"></div>
                <div class="menu-line" style="width: 14px; margin-right: -6px;"></div>
                <div class="menu-line"></div>
            </div>
            <h1 class="logo-title">BRAVORIANS</h1>
        </div>
        <button class="btn-keluar">KELUAR</button>
    </div>

    <div class="middle-logo-container">
        <img src="logo_bravorians.png" alt="Logo Bravorians B.S.I" class="middle-logo">
    </div>

    <div class="form-container">
        <div class="input-box">
            <label>Nama Penuh</label>
            <input type="text" id="nama" placeholder="Masukkan Nama Penuh">
        </div>
        <div class="input-box">
            <label>No. Gaji</label>
            <input type="text" id="noGaji" placeholder="Masukkan No. Gaji">
        </div>
        <button class="btn-submit" onclick="semakOT()">Semak Jumlah OT</button>
        <div id="loading" class="loading-text">Menghubungi pangkalan data...</div>
    </div>

    <div id="resultCard" class="card-result">
        <div class="card-header">Keputusan Semakan</div>
        <div class="card-body">
            
            <div class="info-row">
                <div class="info-left">
                    <span class="lbl-top">Nama Pegawai</span>
                    <span class="lbl-sub" id="resTarikh">Semakan Aktif</span>
                </div>
                <div class="val-right" id="resNama">-</div>
            </div>

            <hr style="border: none; border-top: 1px dashed #eff1f4; margin-bottom: 20px;">

            <div class="info-row" style="margin-bottom: 0; align-items: center;">
                <div class="info-left">
                    <span class="lbl-top" id="resNoGaji">No. Gaji: -</span>
                    <span class="lbl-sub">Jumlah Bayaran OT</span>
                </div>
                <div class="val-amount" id="jumlahTuntutan">RM 0.00</div>
            </div>

        </div>
    </div>
</div>

<script>
function semakOT() {
    const namaInput = document.getElementById('nama').value.trim();
    const noGajiInput = document.getElementById('noGaji').value.trim();
    const loading = document.getElementById('loading');
    const resultCard = document.getElementById('resultCard');

    if (!namaInput || !noGajiInput) {
        alert("⚠️ Sila masukkan Nama Penuh dan No. Gaji.");
        return;
    }

    loading.style.display = "block";
    resultCard.style.display = "none";

    const nama = namaInput.toUpperCase();
    const inputClean = noGajiInput.replace(/\s+/g, '');
    const noGajiWithSpace = inputClean.match(/.{1,2}/g).join(' ');

    // Pautan Google Web App Asli Anda
    const webAppURL = "https://script.google.com/macros/s/AKfycbz_9eI7B5n4i-A6R9Bfby6q2vGfD9GfW_qZ6b_oZ8Xb-D6-G6I7_9Z_Y-6_Z9_Z-6/exec"; 
    const finalURL = `${webAppURL}?name=${encodeURIComponent(nama)}&nogaji=${encodeURIComponent(noGajiWithSpace)}`;

    fetch(finalURL)
    .then(response => response.json())
    .then(data => {
        loading.style.display = "none";
        
        if (data.status === "success") {
            resultCard.style.display = "block";
            
            document.getElementById('resNama').innerText = nama;
            document.getElementById('resNoGaji').innerText = `No. Gaji: ${noGajiInput}`;
            
            const jumlahOtClean = data.jumlah_ot.toString().replace(/RM/g, '').trim();
            document.getElementById('jumlahTuntutan').innerText = `RM ${jumlahOtClean}`;
        } else {
            resultCard.style.display = "block";
            document.getElementById('resNama').innerText = "TIDAK DIJUMPAI";
            document.getElementById('resNoGaji').innerText = "Ralat Data";
            document.getElementById('jumlahTuntutan').innerText = "RM 0.00";
        }
    })
    .catch(error => {
        loading.style.display = "none";
        alert("Ralat! Sistem gagal memuatkan data.");
    });
}
</script>

</body>
</html>
