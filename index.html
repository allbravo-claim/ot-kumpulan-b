<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semakan OT Pegawai - Bravorians</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f7f9fa; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .wrapper { max-width: 412px; width: 100%; }
        .input-card { background-color: #ffffff; border-radius: 28px; padding: 30px 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        label { display: block; font-size: 12px; font-weight: 800; color: #111111; text-transform: uppercase; margin-bottom: 12px; }
        input { width: 100%; padding: 18px; border: none; background-color: #f1f3f6; border-radius: 16px; box-sizing: border-box; font-size: 14px; font-weight: 700; margin-bottom: 20px; }
        .btn-semak { width: 100%; padding: 18px; background-color: #f1c40f; border: none; color: #111111; font-size: 13px; font-weight: 800; border-radius: 16px; cursor: pointer; text-transform: uppercase; }
        #hasil { margin-top: 20px; padding: 20px; border-radius: 18px; text-align: center; font-weight: 800; display: none; background-color: #111111; color: #f1c40f; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="input-card">
        <label>No. Gaji</label>
        <input type="text" id="noGaji" placeholder="Masukkan No. Gaji">
        
        <label>Email</label>
        <input type="email" id="email" placeholder="Masukkan Email Anda">
        
        <button class="btn-semak" onclick="semak()">Semak Jumlah OT</button>
        <div id="hasil"></div>
    </div>
</div>

<script>
function semak() {
    const nogaji = document.getElementById('noGaji').value;
    const email = document.getElementById('email').value;
    const hasil = document.getElementById('hasil');
    
    // 👇 TAMPAL URL WEB APP ANDA DI SINI
    const url = "https://script.google.com/macros/s/AKfycbz8W36oD5NMtpR1dV367GIlRcfK4o-1kpyprXjalGL0heqtNVCvhIhyCHW2pcMb3Os5/exec"; 
    
    hasil.style.display = "block";
    hasil.innerText = "Sedang menyemak...";
    
    fetch(`${url}?nogaji=${encodeURIComponent(nogaji)}&email=${encodeURIComponent(email)}`)
    .then(r => r.json())
    .then(data => {
        if (data.status === "success") {
            hasil.style.backgroundColor = "#f1c40f";
            hasil.style.color = "#111111";
            hasil.innerText = "Jumlah OT: " + data.jumlah_ot;
        } else {
            hasil.style.backgroundColor = "#111111";
            hasil.style.color = "#f1c40f";
            hasil.innerText = "No. Gaji atau Email salah!";
        }
    });
}
</script>
</body>
</html>
